services:
  backend:
    build: .
    container_name: attendance-backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./backend/instance:/app/instance
    env_file:
      - .env
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - DAUOFFICE_CLIENT_ID=${DAUOFFICE_CLIENT_ID}
      - DAUOFFICE_CLIENT_SECRET=${DAUOFFICE_CLIENT_SECRET}
      - DAUOFFICE_API_URL=${DAUOFFICE_API_URL:-https://api.daouoffice.com}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///attendance.db}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: attendance-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
