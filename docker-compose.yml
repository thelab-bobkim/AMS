version: '3.8'

services:
  backend:
    build: .
    container_name: attendance-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - FLASK_ENV=development
      - DAUOFFICE_API_KEY=${DAUOFFICE_API_KEY}
      - DAUOFFICE_API_URL=${DAUOFFICE_API_URL}
      - DAUOFFICE_SERVER_IP=${DAUOFFICE_SERVER_IP}
    restart: unless-stopped
  
  nginx:
    image: nginx:alpine
    container_name: attendance-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
