version: "3.8"

services:
  # ── n8n 자동화 서버 ──────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-renewal-system
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=ChangeThisPassword123!
      - WEBHOOK_URL=http://localhost:5678/
      - TZ=Asia/Seoul
      # 이메일 발송 설정 (Gmail SMTP)
      - N8N_EMAIL_MODE=smtp
      - N8N_SMTP_HOST=smtp.gmail.com
      - N8N_SMTP_PORT=465
      - N8N_SMTP_SSL=true
      - N8N_SMTP_USER=${SMTP_USER:-aikms.htkim5505@gmail.com}
      - N8N_SMTP_PASS=${SMTP_PASS}
      - N8N_SMTP_SENDER=${SMTP_USER:-aikms.htkim5505@gmail.com}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    networks:
      - n8n-network
    depends_on:
      n8n-postgres:
        condition: service_healthy

  # ── PostgreSQL (계약 데이터) ─────────────────────────────
  n8n-postgres:
    image: postgres:13
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_password_2024
      - TZ=Asia/Seoul
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./n8n/sql/01_create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql:ro
    networks:
      - n8n-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n_data:
  pg_data:

networks:
  n8n-network:
    driver: bridge
